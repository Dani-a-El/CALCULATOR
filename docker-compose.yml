version: "3.9"

services:
  api:
    build:
      context: ./pura_calc_api
    ports:
      - "8000:8000"
    env_file:
      - ./pura_calc_api/.env.example
    environment:
      MYSQL_ENABLED: "true"
      MYSQL_HOST: "db"
      MYSQL_PORT: "3306"
      MYSQL_USER: "root"
      MYSQL_PASSWORD: "root"
      MYSQL_DATABASE: "calculator_db"
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "calculator_db"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
